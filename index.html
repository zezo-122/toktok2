<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة مشوارك | الغراقة وميت العامل</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #5d3fd3; --s: #22c55e; --bg: #f4f7f6; --danger: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); direction: rtl; padding: 15px; }
        
        .main-menu { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top: 40px; }
        .area-card { background: white; width: 100%; max-width: 400px; padding: 25px; border-radius: 20px; text-align: center; cursor: pointer; box-shadow: 0 8px 15px rgba(0,0,0,0.05); border: 2px solid transparent; transition: 0.3s; }
        .area-card:hover { border-color: var(--p); transform: translateY(-5px); }
        .area-card i { font-size: 35px; color: var(--p); margin-bottom: 10px; }
        
        .screen { display: none; background: white; border-radius: 20px; padding: 15px; min-height: 100vh; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; background: var(--p); color: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        
        .section { background: #fdfdfd; border: 1px solid #eee; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        h3 { font-size: 15px; margin-bottom: 10px; color: var(--p); border-right: 3px solid var(--p); padding-right: 8px; }
        
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; margin-top: 5px; }
        .btn-add { background: var(--s); }
        .btn-back { background: rgba(255,255,255,0.2); border: 1px solid white; padding: 5px 12px; font-size: 13px; border-radius: 5px; cursor: pointer; }

        .data-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        .data-table th, .data-table td { padding: 8px; border-bottom: 1px solid #eee; text-align: center; }
        .data-table th { background: #f8fafc; color: #64748b; }
        
        .btn-call { background-color: #22c55e; color: white; padding: 4px 8px; border-radius: 6px; text-decoration: none; font-size: 10px; display: inline-flex; align-items: center; gap: 3px; font-weight: bold; }
        .btn-clear { background-color: #6366f1; color: white; border: none; padding: 4px 8px; border-radius: 6px; font-size: 10px; cursor: pointer; font-weight: bold; }
        .del-btn { color: var(--danger); border: none; background: none; cursor: pointer; font-size: 14px; }
        .flex-row { display: flex; gap: 8px; }
    </style>
</head>
<body>

<div id="homeScreen" class="main-menu">
    <div style="text-align:center; margin-bottom:10px;">
        <i class="fas fa-users-cog" style="font-size: 40px; color: var(--p);"></i>
        <h1 style="color:var(--p); margin-top:10px;">إدارة مناطق مشوارك</h1>
    </div>
    
    <div class="area-card" onclick="openScreen('الغراقة')">
        <i class="fas fa-map-marker-alt"></i>
        <h2>إدارة الغراقة</h2>
    </div>

    <div class="area-card" onclick="openScreen('ميت العامل')">
        <i class="fas fa-building"></i>
        <h2>إدارة ميت العامل</h2>
    </div>
</div>

<div id="controlScreen" class="screen">
    <div class="header">
        <button class="btn-back" onclick="goHome()"><i class="fas fa-arrow-right"></i> رجوع</button>
        <h2 id="screenTitle">اسم البلد</h2>
        <i class="fas fa-cog"></i>
    </div>

    <div class="section">
        <h3>📍 خطوط السير والأسعار</h3>
        <div class="flex-row">
            <input type="text" id="destName" placeholder="إلى بلد..">
            <input type="number" id="destPrice" placeholder="السعر" style="width: 80px;">
        </div>
        <button class="btn btn-add" onclick="addDestination()">إضافة للقايمة +</button>
        <table class="data-table">
            <thead><tr><th>الوجهة</th><th>السعر</th><th>حذف</th></tr></thead>
            <tbody id="destTableBody"></tbody>
        </table>
    </div>

    <div class="section">
        <h3>🛺 تسجيل كابتن جديد</h3>
        <input type="text" id="dName" placeholder="اسم الكابتن">
        <input type="tel" id="dPhone" placeholder="رقم الهاتف">
        <button class="btn btn-add" style="background:var(--p)" onclick="saveDriver()">حفظ البيانات +</button>
    </div>

    <div class="section">
        <h3>📋 طلبات <span class="active-area-name"></span></h3>
        <table class="data-table">
            <thead><tr><th>العميل</th><th>الوجهة</th><th>السعر</th><th>الحالة</th></tr></thead>
            <tbody id="areaOrders"></tbody>
        </table>
    </div>

    <div class="section">
        <h3>👥 كباتن <span class="active-area-name"></span> والمديونية</h3>
        <table class="data-table">
            <thead>
                <tr>
                    <th>الاسم</th>
                    <th>الكود</th>
                    <th>المديونية</th>
                    <th>تحكم</th>
                </tr>
            </thead>
            <tbody id="driversList"></tbody>
        </table>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCf8_Ks8OC1J8wI5dRKS55GE_KCAO7H-8c",
        authDomain: "toktok-f5b4a.firebaseapp.com",
        databaseURL: "https://toktok-f5b4a-default-rtdb.firebaseio.com",
        projectId: "toktok-f5b4a",
        storageBucket: "toktok-f5b4a.firebasestorage.app",
        messagingSenderId: "970149361447",
        appId: "1:970149361447:web:1922b3d2b797cd26665b02"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let activeArea = "";

    function openScreen(area) {
        activeArea = area;
        document.getElementById('homeScreen').style.display = 'none';
        document.getElementById('controlScreen').style.display = 'block';
        document.getElementById('screenTitle').innerText = "تحكم " + area;
        document.querySelectorAll('.active-area-name').forEach(el => el.innerText = area);
        loadAllData();
    }

    function goHome() {
        document.getElementById('homeScreen').style.display = 'flex';
        document.getElementById('controlScreen').style.display = 'none';
    }

    function addDestination() {
        const name = document.getElementById('destName').value;
        const price = document.getElementById('destPrice').value;
        if(!name || !price) return alert("اكمل البيانات");
        db.ref('pricing/' + activeArea + '/destinations').push({ name: name, price: price });
        document.getElementById('destName').value = "";
        document.getElementById('destPrice').value = "";
    }

    function saveDriver() {
        const n = document.getElementById('dName').value;
        const p = document.getElementById('dPhone').value;
        if(!n || !p) return alert("اكمل البيانات");
        const code = Math.floor(1000 + Math.random() * 9000);
        db.ref('drivers/' + p).set({
            name: n, phone: p, area: activeArea, password: code, commissionBalance: 0
        }).then(() => {
            alert("تم الحفظ! كود السائق: " + code);
            document.getElementById('dName').value = "";
            document.getElementById('dPhone').value = "";
        });
    }

    // تصفير المديونية
    function clearDebt(p) {
        if(confirm("هل تريد تصفير حساب هذا السائق؟")) {
            db.ref('drivers/' + p).update({ commissionBalance: 0 });
        }
    }

    function loadAllData() {
        // 1. الأسعار
        db.ref('pricing/' + activeArea + '/destinations').on('value', snap => {
            let html = '';
            snap.forEach(c => {
                html += `<tr><td>${c.val().name}</td><td>${c.val().price} ج</td>
                <td><button class="del-btn" onclick="db.ref('pricing/${activeArea}/destinations/${c.key}').remove()">🗑️</button></td></tr>`;
            });
            document.getElementById('destTableBody').innerHTML = html || '<tr><td colspan="3">لا توجد أسعار</td></tr>';
        });

        // 2. الطلبات
        db.ref('orders').on('value', snap => {
            let html = '';
            snap.forEach(c => {
                const o = c.val();
                if(o.customerArea === activeArea) {
                    html += `<tr>
                        <td>${o.customerPhone}</td>
                        <td>${o.to || 'طرد'}</td>
                        <td>${o.price}ج</td>
                        <td>
                            ${o.driverPhone ? `<a href="tel:${o.driverPhone}" class="btn-call">اتصل</a>` : '⏳'}
                            <button class="del-btn" onclick="db.ref('orders/${c.key}').remove()">❌</button>
                        </td>
                    </tr>`;
                }
            });
            document.getElementById('areaOrders').innerHTML = html || '<tr><td colspan="4">لا توجد طلبات</td></tr>';
        });

        // 3. السائقين والمديونية
        db.ref('drivers').orderByChild('area').equalTo(activeArea).on('value', snap => {
            let html = '';
            snap.forEach(c => {
                const d = c.val();
                const debt = d.commissionBalance || 0;
                const debtStyle = debt > 0 ? 'color:red; font-weight:bold;' : 'color:green;';
                html += `<tr>
                    <td>${d.name}</td>
                    <td>${d.password}</td>
                    <td style="${debtStyle}">${debt} ج</td>
                    <td>
                        <button class="btn-clear" onclick="clearDebt('${d.phone}')">تصفير</button>
                        <a href="tel:${d.phone}" class="btn-call"><i class="fas fa-phone"></i></a>
                        <button class="del-btn" onclick="if(confirm('حذف؟')) db.ref('drivers/${d.phone}').remove()">🗑️</button>
                    </td>
                </tr>`;
            });
            document.getElementById('driversList').innerHTML = html || '<tr><td colspan="4">لا يوجد كباتن</td></tr>';
        });
    }
</script>
</body>
</html>
